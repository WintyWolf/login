<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portal.mn</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-black rounded-xl p-6 space-y-4">
        <img width="80" height="80" alt="portal.mn" src="https://cdn.portal.mn/assets/mobile-logo.png" class="mx-auto">
      <h1 class="text-center">Нэвтрэх</h1>
      <div class="space-y-3">
        <input type="text" name="username" id="username" placeholder="Name" class="w-full rounded-lg bg-zinc-500 px-3 py-2" />
        <div class="relative w-full mx-auto">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded pr-10" />
  <button type="button" id="togglePassword" class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
    <svg id="eyeIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    </svg>
  </button>
</div>

<script>
  const password = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");
  const eyeIcon = document.getElementById("eyeIcon");

  togglePassword.addEventListener("click", function () {
    if (password.type === "password") {
      password.type = "text";
      eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />`;
    } else {
      password.type = "password";
      eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />`;
    }
  });
</script>
      </div>
      <div class="h-10 rounded-lg bg-purple-500 flex items-center justify-center font-semibold">Нэвтрэх</div>
      <p class="text-center text-sm text-gray-300">privacy policy      terms</p>
      <p class="text-center text-sm text-gray-300">no account? <a href="#" class="text-purple-500">Бүртгүүлэх</a></p>
      <div class="h-10 rounded-lg bg-blue-500 flex items-center justify-center font-semibold">continue with facebook</div>
    </div>
  </div>
</body>
</html>
